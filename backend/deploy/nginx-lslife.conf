# 连山同城 LsLife · Nginx 反代 (HTTP 阶段; certbot 会自动改写 HTTPS)
# 部署路径: /etc/nginx/sites-available/lslife

upstream lslife_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name mentalhlp.site www.mentalhlp.site;

    # Let's Encrypt 校验
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # WebSocket 实时通道
    location /ws {
        proxy_pass http://lslife_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # REST API
    location /api/ {
        proxy_pass http://lslife_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # 健康检查快捷入口 (可选)
    location = /health {
        proxy_pass http://lslife_api/api/health;
        proxy_set_header Host $host;
    }

    location / {
        return 200 'LsLife API · https://mentalhlp.site/api/health\n';
        add_header Content-Type text/plain;
    }
}
